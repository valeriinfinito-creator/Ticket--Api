services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tickets_app
    restart: unless-stopped
    volumes:
      - .:/var/www
    networks:
      - tickets_network
    depends_on:
      - sqlserver

  nginx:
    image: nginx:alpine
    container_name: tickets_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - tickets_network
    depends_on:
      - app

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: tickets_sqlserver
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "TicketsAPI@2026"
      MSSQL_PID: "Express"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    networks:
      - tickets_network

networks:
  tickets_network:
    driver: bridge

volumes:
  sqlserver_data: